# 网关：根据 User-Agent 自动分发到 PC 端或移动端
# 移动端 User-Agent 特征：Mobile/Android/iPhone/iPad/iPod/Windows Phone

map $http_user_agent $upstream_target {
    default                    kg-ai-frontend:80;
    "~*Mobile"                 kg-ai-frontend-mobile:80;
    "~*Android"                kg-ai-frontend-mobile:80;
    "~*iPhone"                 kg-ai-frontend-mobile:80;
    "~*iPad"                   kg-ai-frontend-mobile:80;
    "~*iPod"                   kg-ai-frontend-mobile:80;
    "~*Windows Phone"          kg-ai-frontend-mobile:80;
}

server {
    listen 80;
    server_name _;

    # 在 proxy_pass 中使用变量做上游主机名时，nginx 需要一个 DNS resolver 才能
    # 动态解析容器名。Docker 内置 DNS 固定为 127.0.0.11。valid=10s 让容器重建后
    # 的新 IP 能被及时刷新，避免上游重启后一直 502。
    resolver 127.0.0.11 valid=10s ipv6=off;

    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # API 请求直接转发到后端（不分发）。同样用变量触发动态解析，
    # 后端容器重建后网关无需重启即可恢复。
    location /api/ {
        set $backend_upstream kg-ai-backend:8000;
        proxy_pass http://$backend_upstream;
        proxy_set_header Host $host;
        # 大文件上传（知识库文档）放宽超时与体积限制
        client_max_body_size 50m;
        proxy_read_timeout 120s;
    }

    # 其他请求按 UA 分发到 PC / 移动端前端
    location / {
        proxy_pass http://$upstream_target;
        proxy_set_header Host $host;
    }
}
