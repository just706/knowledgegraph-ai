services:
  backend:
    build:
      context: ./backend
    container_name: kg-ai-backend
    env_file:
      - ./backend/.env
    environment:
      # 容器内路径：SQLite 与上传文件落到挂载卷
      - DATABASE_URL=sqlite:////app/data/kg_ai.db
      - CHROMA_PERSIST_DIR=/app/data/chroma
      - DEBUG=False
      # 强制清除代理（DeepSeek 直连即可）
      - HTTP_PROXY=
      - HTTPS_PROXY=
      - http_proxy=
      - https_proxy=
      - NO_PROXY=*

    volumes:
      - backend-data:/app/data
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/v1/health').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      args:
        # 前端通过同源 /api/v1 访问（由 nginx 反代到 backend）
        - VITE_API_BASE_URL=/api/v1
    container_name: kg-ai-frontend
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  frontend-mobile:
    build:
      context: ./frontend-mobile
      args:
        - VITE_API_BASE_URL=/api/v1
    container_name: kg-ai-frontend-mobile
    ports:
      - "5174:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  # 网关：统一入口（80），根据 User-Agent 分发到 PC 或移动端，/api 反代到后端
  gateway:
    image: nginx:1.27-alpine
    container_name: kg-ai-gateway
    ports:
      - "80:80"
    volumes:
      - ./gateway.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
      frontend-mobile:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  backend-data:
