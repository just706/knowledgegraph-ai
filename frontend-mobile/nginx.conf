server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # 禁止浏览器缓存 HTML 与 JS/CSS，避免手机端长期缓存旧版本导致“打开还是旧登录页/点不动”
    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri $uri/ /index.html;
    }

    # 同源但 HTML 用 <script type="module" crossorigin> 引入，iOS/部分手机浏览器
    # 会按 CORS 模式严格校验，缺少 ACAO 头会拒绝执行脚本 → 整页白屏“打不开”。
    # 对静态资源显式返回 ACAO，匹配 crossorigin 需求。
    location ~* \.(js|css|mjs)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Access-Control-Allow-Origin "*";
    }

    # 反向代理后端 API（同源 /api/v1 转发到 backend 容器）
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host backend:8000;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
